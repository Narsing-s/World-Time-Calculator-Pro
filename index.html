<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌍 World Time Calculator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">

<!-- ✅ SEO / Google -->
<meta name="description" content="Professional world clock & time zone converter with real‑time updates, offline support and premium UI">
<meta name="keywords" content="world clock, timezone converter, global time, time calculator">
<meta name="author" content="World Time Calculator Pro">

<!-- ✅ Font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f2027;
  --card:rgba(255,255,255,.14);
  --text:#fff;
  --accent:#3b82f6;
}

.light{
  --bg:#f3f4f6;
  --card:#ffffffcc;
  --text:#000;
}

body{
  margin:0;
  font-family:Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.4s;
  overflow-x:hidden;
}

/* ✅ Animated background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #3b82f6 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #9333ea 0%, transparent 40%);
  opacity:.25;
  z-index:-1;
  animation:floatBg 18s infinite alternate linear;
}
@keyframes floatBg{
  to{transform:scale(1.1) translateY(-40px)}
}

/* ✅ App intro */
.container{
  max-width:1150px;
  margin:auto;
  padding:25px;
  animation:enter .8s ease-out;
}
@keyframes enter{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:none}
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.stats{
  display:flex;
  gap:12px;
  margin-top:10px;
  flex-wrap:wrap;
}
.badge{
  background:rgba(0,0,0,.28);
  padding:6px 12px;
  border-radius:14px;
  font-size:13px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(16px);
  padding:22px;
  border-radius:20px;
  margin-top:25px;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
}

.controls{display:flex;gap:10px;flex-wrap:wrap}

select,input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}
button:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(59,130,246,.6)}
button:active{transform:scale(.97)}

button::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle,rgba(255,255,255,.5) 10%,transparent 60%);
  opacity:0;
}
button:active::after{opacity:1}

.clock-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
  max-height:440px;
  overflow:auto;
}

.clock{
  padding:16px;
  border-radius:16px;
  background:#fff;
  color:#000;
  position:relative;
  animation:pulse 2s infinite alternate;
  transition:.3s;
}
.clock:hover{
  transform:scale(1.03);
  box-shadow:0 0 0 2px rgba(59,130,246,.45),
             0 0 30px rgba(59,130,246,.6);
}
@keyframes pulse{
  to{box-shadow:0 0 18px rgba(59,130,246,.45)}
}

.favorite{
  position:absolute;
  top:8px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}

.day{background:#e0f2fe}
.night{background:#1e293b;color:#fff}

.small{font-size:13px;opacity:.85}

.timeline{
  display:flex;
  gap:4px;
  margin-top:12px;
}
.hour{
  flex:1;
  text-align:center;
  font-size:11px;
  padding:6px 0;
  border-radius:6px;
  opacity:.75;
}
.dayhour{background:#38bdf8}
.nighthour{background:#1e293b;color:#fff}
.current{box-shadow:0 0 0 2px #22c55e}

.highlight{
  animation:flash 1.2s ease;
}
@keyframes flash{
  from{background:#22c55e}
  to{background:transparent}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <div>
    <h1>🌍 World Time Calculator Pro</h1>
    <small>Smart • Offline • Professional</small>
    <div class="stats">
      <div class="badge">🌐 Zones: <span id="zoneCount"></span></div>
      <div class="badge">⭐ Favorites: <span id="favCount"></span></div>
      <div class="badge">📍 Local: <span id="localZone"></span></div>
      <div class="badge" id="net">🟢 Online</div>
    </div>
  </div>
  <button onclick="toggleTheme()">🌓</button>
</div>

<div class="card">
  <h2>🔍 Instant Timezone Search</h2>
  <input placeholder="Search timezone…" oninput="filterZones(this.value)">
</div>

<div class="card">
  <h2>🕒 Live World Clocks</h2>
  <div id="clocks" class="clock-grid"></div>
</div>

<div class="card">
  <h2>🔄 Time Converter</h2>
  <div class="controls">
    <select id="fromZone"></select>
    <select id="toZone"></select>
    <input type="datetime-local" id="timeInput">
    <button onclick="convertTime()">Convert</button>
  </div>
  <h3 id="result"></h3>
  <div id="timeline" class="timeline"></div>
</div>

</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const zones = Intl.supportedValuesOf("timeZone");
let filtered=[...zones];
const favs=JSON.parse(localStorage.getItem("favs")||"[]");

zoneCount.textContent=zones.length;
localZone.textContent=Intl.DateTimeFormat().resolvedOptions().timeZone;

[fromZone,toZone].forEach(s=>zones.forEach(z=>s.innerHTML+=`<option>${z}</option>`));
fromZone.value="Asia/Kolkata";

function flag(z){
  return String.fromCodePoint(...z.split("/")[0].slice(0,2).toUpperCase()
    .split("").map(c=>127397+c.charCodeAt()));
}

function isDay(z){
  const h=new Date().toLocaleString("en-US",{timeZone:z,hour:'numeric',hour12:false});
  return h>=6&&h<18;
}

function updateClocks(){
  clocks.innerHTML="";
  const list=[...favs,...filtered.filter(z=>!favs.includes(z))].slice(0,120);
  favCount.textContent=favs.length;
  list.forEach(z=>{
    clocks.innerHTML+=`
    <div class="clock ${isDay(z)?'day':'night'}">
      <div class="favorite" onclick="toggleFav('${z}')">${favs.includes(z)?"⭐":"☆"}</div>
      <b>${flag(z)} ${z}</b><br>
      ${new Date().toLocaleString("en-US",{timeZone:z})}
      <div class="small">${isDay(z)?"☀️ Day":"🌙 Night"}</div>
    </div>`;
  });
}

function toggleFav(z){
  const i=favs.indexOf(z);
  i>-1?favs.splice(i,1):favs.push(z);
  localStorage.setItem("favs",JSON.stringify(favs));
  updateClocks();
}

function filterZones(q){
  filtered=zones.filter(z=>z.toLowerCase().includes(q.toLowerCase()));
  updateClocks();
}

setInterval(updateClocks,1000);updateClocks();

function convertTime(){
  if(!timeInput.value)return;
  const d=new Date(timeInput.value);
  result.classList.add("highlight");
  setTimeout(()=>result.classList.remove("highlight"),800);
  result.textContent=new Intl.DateTimeFormat("en-US",{timeZone:toZone.value,dateStyle:"full",timeStyle:"long"}).format(d);
  drawTimeline();
}

function drawTimeline(){
  timeline.innerHTML="";
  const now=new Date().getHours();
  for(let i=0;i<24;i++){
    timeline.innerHTML+=`<div class="hour ${(i>=6&&i<18)?'dayhour':'nighthour'} ${i===now?'current':''}">${i}</div>`;
  }
}

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.theme=document.body.classList.contains("light");
}
if(localStorage.theme==="true")document.body.classList.add("light");

window.addEventListener("online",()=>net.textContent="🟢 Online");
window.addEventListener("offline",()=>net.textContent="🔴 Offline");
</script>
</body>
</html>
