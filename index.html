<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌍 World Time Calculator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Roboto,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  min-height:100vh;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.header{
  text-align:center;
  padding:25px;
  border-radius:20px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  animation:slideDown .8s ease;
}

@keyframes slideDown{
  from{transform:translateY(-30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  padding:25px;
  border-radius:20px;
  margin-top:25px;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  animation:fadeIn .8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(.95)}
  to{opacity:1;transform:scale(1)}
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

select,input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,.9);
  color:#333;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

button:hover{
  background:#2563eb;
  transform:scale(1.05);
}

.clock-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:15px;
  max-height:420px;
  overflow:auto;
  padding-right:8px;
}

.clock{
  padding:16px;
  background:rgba(255,255,255,.85);
  color:#000;
  border-radius:14px;
  font-size:15px;
  font-weight:500;
  animation:pulse 1.5s ease-in-out infinite alternate;
}

@keyframes pulse{
  from{box-shadow:0 0 0 rgba(59,130,246,.4)}
  to{box-shadow:0 0 20px rgba(59,130,246,.4)}
}

.result{
  font-size:20px;
  font-weight:600;
  margin-top:15px;
}

small{opacity:.9}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>🌍 World Time Calculator Pro</h1>
    <small>Live Global Clock • Convert Any Country Time Instantly</small>
  </div>

  <!-- WORLD CLOCKS -->
  <div class="card">
    <h2>🕒 Live World Time</h2>
    <div id="clocks" class="clock-grid"></div>
  </div>

  <!-- CONVERTER -->
  <div class="card">
    <h2>🔄 Time Zone Converter</h2>
    <div class="controls">
      <select id="fromZone"></select>
      <select id="toZone"></select>
      <input type="datetime-local" id="timeInput">
      <button onclick="convertTime()">Convert</button>
    </div>
    <div id="result" class="result"></div>
  </div>

</div>

<script>
const timeZones = Intl.supportedValuesOf("timeZone");

const fromZone=document.getElementById("fromZone");
const toZone=document.getElementById("toZone");
const clocks=document.getElementById("clocks");
const result=document.getElementById("result");

timeZones.forEach(z=>{
  fromZone.innerHTML+=`<option value="${z}">${z}</option>`;
  toZone.innerHTML+=`<option value="${z}">${z}</option>`;
});

fromZone.value="Asia/Kolkata";
toZone.value="UTC";

function updateClocks(){
  clocks.innerHTML="";
  timeZones.slice(0,120).forEach(z=>{
    const time=new Date().toLocaleString("en-US",{
      timeZone:z,
      dateStyle:"medium",
      timeStyle:"medium"
    });
    clocks.innerHTML+=`
      <div class="clock">
        <b>${z}</b><br>${time}
      </div>`;
  });
}

setInterval(updateClocks,1000);
updateClocks();

function convertTime(){
  if(!timeInput.value) return;
  const date = new Date(timeInput.value);

  const converted = new Intl.DateTimeFormat("en-US",{
    timeZone:toZone.value,
    dateStyle:"full",
    timeStyle:"long"
  }).format(date);

  result.innerHTML=`✅ Converted Time:<br>${converted}`;
}
</script>

</body>
</html>
